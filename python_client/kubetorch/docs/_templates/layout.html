{% extends "!layout.html" %}

{% block extrahead %}
  {{ super() }}
  {% if google_site_verification %}
    <meta name="google-site-verification" content="{{ google_site_verification|e }}">
  {% endif %}
  {% if google_analytics_id %}
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ google_analytics_id|e }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ google_analytics_id|e }}');
    </script>
  {% endif %}
{% endblock extrahead %}

{% block css %}
  <script data-cfasync="false">
    localStorage.setItem("mode", "light");
    localStorage.setItem("theme", "light");
    document.documentElement.dataset.mode = "light";
    document.documentElement.dataset.theme = "light";
  </script>
  {{ super() }}
{% endblock css %}
