name: Qwen3-ASR Runner Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable image tag to publish"
        required: true
      push_image:
        description: "Push image to GHCR"
        required: true
        type: choice
        options:
          - "yes"
          - "no"
        default: "yes"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event.inputs.push_image == 'yes' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Qwen3-ASR runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: examples/qwen3_asr_orin/Dockerfile.runner
          platforms: linux/amd64
          push: ${{ github.event.inputs.push_image == 'yes' }}
          tags: ghcr.io/cezarc1/kubetorch-qwen3-asr-orin-runner:${{ github.event.inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
