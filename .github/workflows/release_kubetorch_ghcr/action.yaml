name: "Release Kubetorch in GHCR"
description: "Packages and releases the Kubetorch Helm chart to GHCR."

inputs:
  gh_helm_token:
    description: "GitHub token for authenticating to GHCR"
    required: true
  slack_bot_token:
    description: "Slack bot token for optional release notifications"
    required: false
    default: ""
  slack_channel_id:
    description: "Slack channel ID for optional release notifications"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: latest

    - name: Package Helm chart
      shell: bash
      run: release/package_chart.sh

    - name: Extract Helm chart version
      id: get_version
      shell: bash
      run: |
        VERSION=$(yq -r '.version' charts/kubetorch/Chart.yaml)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Login to GHCR
      shell: bash
      run: |
        echo "${{ inputs.gh_helm_token }}" | helm registry login ghcr.io \
          --username cezarc1 --password-stdin

    - name: Push chart to GHCR
      shell: bash
      run: |
        CHART_TGZ=$(ls kubetorch-*.tgz)
        helm push "$CHART_TGZ" oci://ghcr.io/cezarc1/charts

    - name: Post release notification
      if: ${{ always() && inputs.slack_bot_token != '' && inputs.slack_channel_id != '' }}
      uses: slackapi/slack-github-action@v1.24.0
      with:
        channel-id: ${{ inputs.slack_channel_id }}
        slack-message: |
          [*kubetorch*] Updated Helm chart in GHCR with version *v${{ steps.get_version.outputs.version }}* 🚀
          Run by: *${{ github.actor }}*
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_bot_token }}
