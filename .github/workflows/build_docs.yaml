name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install kubetorch
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system -e ./python_client[client] pytest pytest-asyncio
        shell: bash

      - name: Install docs requirements
        run: pip install -r python_client/kubetorch/docs/requirements.txt

      - name: Validate recovered examples and generated tutorials
        run: |
          python -m pytest -q python_client/tests/docs --level unit
          python scripts/docs/render_tutorials.py --check
          python scripts/docs/check_example_compat.py
          python -m compileall -q examples/tutorials

      - name: Build docs with warnings as errors
        run: |
          python -m sphinx -W --keep-going -b html \
            python_client/kubetorch/docs \
            python_client/kubetorch/docs/_build/html

      - name: Check external links
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python -m sphinx -b linkcheck \
            python_client/kubetorch/docs \
            python_client/kubetorch/docs/_build/linkcheck

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: python_client/kubetorch/docs/_build/html

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: python_client/kubetorch/docs/_build/html

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
